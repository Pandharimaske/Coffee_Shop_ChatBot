name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Backend CI ──────────────────────────────────────────────────────────
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install Dependencies
        run: uv sync

      - name: Run Backend Linting
        run: |
          # If ruff or black is installed in the venv, run it. 
          # Otherwise just check if core files are syntax-valid.
          uv run python -m py_compile src/graph/graph.py api/main.py

  # ── Frontend CI ─────────────────────────────────────────────────────────
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

  # ── Deployment ──────────────────────────────────────────────────────────
  deploy:
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Backend Deploy
        if: ${{ secrets.RENDER_BACKEND_HOOK_URL }}
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_HOOK_URL }}"
          echo "🚀 Render deploy hook triggered successfully!"
      
      - name: Vercel Frontend Deployment
        run: |
          echo "🌐 Vercel handles frontend deployment automatically on push."
          echo "✅ CI checks passed, Vercel build should be safe!"
